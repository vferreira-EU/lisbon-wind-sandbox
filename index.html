<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>Lisbon Wind Sandbox</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

html, body, #cesiumContainer{
width:100%;
height:100%;
margin:0;
padding:0;
overflow:hidden;
}

#panel{
position:absolute;
top:15px;
left:15px;
background:rgba(0,0,0,0.75);
color:white;
padding:15px;
font-family:Arial;
border-radius:8px;
width:220px;
}

input{
width:100%;
}

</style>

</head>

<body>

<div id="cesiumContainer"></div>

<div id="panel">

🌬 Wind speed  
<input id="windSpeed" type="range" min="0" max="120" value="30">

<br><br>

🧭 Direction  
<input id="windDir" type="range" min="0" max="360" value="90">

<br><br>

<div id="readout"></div>

</div>

<script>

Cesium.Ion.defaultAccessToken="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiMTRlMWY3OC02M2E0LTQ4YmYtODZkMi00MTk5NTE3NmFmOWQiLCJpZCI6NDA1MTY2LCJpYXQiOjE3NzM3NjQyNDB9.yVJ97_M8bhtRfK0Z5fqIsFrcS00iCQ6IiCZ0zYCuG-g";

const viewer = new Cesium.Viewer("cesiumContainer", {

imageryProvider: new Cesium.OpenStreetMapImageryProvider({
url: "https://a.tile.openstreetmap.org/"
}),

baseLayerPicker:false,
timeline:false,
animation:false

});


// posicionar câmara em Lisboa

viewer.camera.flyTo({

destination: Cesium.Cartesian3.fromDegrees(
-9.094,
38.769,
2500
),

orientation:{
pitch: Cesium.Math.toRadians(-40)
}

});


// edifícios

Cesium.createOsmBuildings().then(function(buildings){
viewer.scene.primitives.add(buildings);
});


// partículas

const particles=[];

class Particle{

constructor(){

this.lon=-9.11+Math.random()*0.04;
this.lat=38.76+Math.random()*0.02;
this.alt=150+Math.random()*150;

this.entity=viewer.entities.add({

position:Cesium.Cartesian3.fromDegrees(
this.lon,this.lat,this.alt
),

point:{
pixelSize:3,
color:Cesium.Color.CYAN
}

});

}

update(speed,dir){

const rad=dir*Math.PI/180;

this.lon+=Math.cos(rad)*speed*0.00001;
this.lat+=Math.sin(rad)*speed*0.00001;

if(this.lon<-9.12||this.lon>-9.07||this.lat<38.75||this.lat>38.78){

this.lon=-9.11+Math.random()*0.04;
this.lat=38.76+Math.random()*0.02;

}

this.entity.position=Cesium.Cartesian3.fromDegrees(
this.lon,this.lat,this.alt
);

}

}


for(let i=0;i<500;i++){
particles.push(new Particle())
}


// sliders

const speedSlider=document.getElementById("windSpeed");
const dirSlider=document.getElementById("windDir");
const readout=document.getElementById("readout");

viewer.clock.onTick.addEventListener(function(){

const speed=parseFloat(speedSlider.value);
const dir=parseFloat(dirSlider.value);

readout.innerHTML=
"Wind: "+speed+" km/h<br>"+
"Direction: "+dir+"°";

particles.forEach(p=>p.update(speed,dir));

});

</script>

</body>
</html>
